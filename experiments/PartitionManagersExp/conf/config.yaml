defaults:
  - dataset: zhou
  - method: kdtree
  - _self_

# =======================================================
# CONFIGURACIÓN DEL STREAMING Y REPETICIONES
# =======================================================
dim: 2
seed: 45
n_runs: 5               # <--- Repeticiones por combinación (para estadística)
stream_steps: [2, 4, 8, 16, 32, 64] # <--- El modelo recibirá datos en esta secuencia

bsesm_params:
  global_epochs: 150
  dict_epochs: 50
  sc_epochs: 15          # Optimizado para velocidad
  atoms_per_dim: 10

wandb:
  project: "PySESM_Streaming"
  entity: "hvaldivia"
  mode: "online"

# =======================================================
# DEFINICIÓN DEL BARRIDO (SOLO DIMENSIONES, DATASETS Y MÉTODOS)
# =======================================================
hydra:
  sweeper:
    params:
      dim: 2, 3, 4
      dataset: zhou, zakharov, styblinski
      method: uniform, kdtree
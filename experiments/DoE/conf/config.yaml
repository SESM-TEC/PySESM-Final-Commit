defaults:
  - _self_

# =========================================================
# EXPERIMENTO RING OSCILLATOR — SESM
#   - Genera validación una sola vez (100k muestras vía PySpice)
#   - Entrena BSESM n_runs veces sobre un vector de tamaños
#   - Compara métodos de particionamiento (uniform, kdtree)
# =========================================================

recovery_mode: false
seed: 42
n_runs: 2

# Vector de tamaños de dataset de entrenamiento (streaming cumulativo)
training_sizes: [100, 500, 1000]

# Métodos a comparar (cada uno carga su yaml en conf/method/<name>.yaml)
methods_to_test: [uniform, kdtree]

# Target a modelar (uno de: f_osc, P_avg, t_rise)
target: f_osc
# Aplica log10 antes de normalizar — recomendado para f_osc (varias órdenes)
target_log: true

# Bsesm hyperparams (mismos del PartitionManagersExp como punto de partida)
bsesm_params:
  global_epochs: 150
  dict_epochs:   50
  sc_epochs:     15
  atoms_per_dim: 50

# =========================================================
# PARÁMETROS DEL OSCILADOR (inyectados al simulador PySpice)
# =========================================================
oscillator:
  n_stages: 51          # debe ser impar y >= 3
  nmos:
    LEVEL: 1
    KP: 120.0e-6
    VTO: 0.5
    LAMBDA: 0.01
  pmos:
    LEVEL: 1
    KP: 60.0e-6
    VTO: -0.5
    LAMBDA: 0.01
  # Rangos de muestreo uniformes [min, max] por feature (unidades SI)
  ranges:
    W_n:    [5.0e-7,  5.0e-6]
    W_p:    [1.0e-6,  1.0e-5]
    L:      [5.0e-7,  2.0e-6]
    Vdd:    [2.85,    3.75]
    C_load: [1.0e-14, 5.0e-13]

# =========================================================
# DATASETS — los CSV se generan UNA sola vez y se reutilizan
# =========================================================
validation:
  n_samples: 100000
  csv_path:  ring_osc_validation.csv
  seed:      2026
  plot_every: 0
  plot_dir:   plots_val
  wandb_table_every: 50   # refresca la tabla incremental en W&B cada N filas

# Entrenamiento: UN CSV POR (run, size) con seed distinto.
# Cada combinación (run_idx, n_samples) genera exactamente n_samples simulaciones
# SPICE frescas y entrena un BSESM desde cero — sin reusar datos entre sizes.
# Dentro de un (run, size), TODOS los métodos comparten esos datos (comparación pareada).
training_per_run:
  csv_dir:     train_runs                          # carpeta de CSVs
  csv_pattern: "run_{run:02d}_n_{n_samples:05d}.csv"
  base_seed:   42                                  # seed = base_seed + run_idx*100000 + n_samples
  plot_every:  0
  plot_dir:    plots_train

# =========================================================
# Salida del experimento
# =========================================================
output:
  results_csv: ring_osc_experiment_results.csv

# =========================================================
# W&B (opcional — set wandb.mode=disabled para correr offline sin login)
# =========================================================
wandb:
  project: "PySESM_RingOsc"
  entity:  "aaronsalasalvarado-tecnologico-de-costa-rica"
  mode:    "online"

# =========================================================
# Hydra sweep (opcional)
# =========================================================
hydra:
  sweeper:
    params:
      target: f_osc

defaults:
  - dataset: zhou
  - method: uniform
  - _self_

recovery_mode: true

dim: 2
seed: 45
n_runs: 25
stream_steps: 5

# Lista de métodos a ejecutar secuencialmente sobre los mismos datos
methods_to_test: [uniform, kdtree] 

bsesm_params:
  global_epochs: 150
  dict_epochs: 50
  sc_epochs: 15
  atoms_per_dim: 10

wandb:
  project: "PySESM_Streaming"
  entity: "hvaldivia"
  mode: "online"

# =======================================================
# DEFINICIÓN DEL BARRIDO
# =======================================================
hydra:
  sweeper:
    params:
      dim: 2, 3, 4, 5, 6, 7, 8, 9, 10
      dataset: zhou, zakharov, styblinski

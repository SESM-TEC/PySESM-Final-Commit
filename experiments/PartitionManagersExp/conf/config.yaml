defaults:
  - dataset: zhou
  - method: uniform
  - _self_

recovery_mode: false

dim: 2
seed: 45
n_runs: 1
stream_steps: [2, 4, 8, 16, 32]

# Lista de métodos a ejecutar secuencialmente sobre los mismos datos
methods_to_test: [uniform, kdtree] 

bsesm_params:
  global_epochs: 5
  dict_epochs: 50
  sc_epochs: 15
  atoms_per_dim: 10

wandb:
  project: "PySESM_Streaming"
  entity: "aaronsalasalvarado"
  mode: "offline"

# =======================================================
# DEFINICIÓN DEL BARRIDO
# =======================================================
hydra:
  sweeper:
    params:
      dim: 1, 2, 3, 4
      dataset: zhou, zakharov, styblinski
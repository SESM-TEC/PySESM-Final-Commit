defaults:
  - dataset: zhou
  - method: uniform # Placeholder inicial
  - _self_

# =======================================================
# CONFIGURACIÓN DEL STREAMING Y REPETICIONES
# =======================================================
dim: 2
seed: 45
n_runs: 25
stream_steps: [2, 4, 8, 16, 32]

# Lista de métodos a ejecutar secuencialmente sobre los mismos datos
methods_to_test: [uniform, kdtree] 

bsesm_params:
  global_epochs: 150
  dict_epochs: 50
  sc_epochs: 15
  atoms_per_dim: 10

wandb:
  project: "PySESM_Streaming"
  entity: "hvaldivia"
  mode: "online"

# =======================================================
# DEFINICIÓN DEL BARRIDO (SOLO DIMENSIONES Y DATASETS)
# =======================================================
hydra:
  sweeper:
    params:
      dim: 2, 3, 4
      dataset: zhou, zakharov, styblinski
      # method: SE ELIMINÓ DE AQUÍ PARA CONTROLARLO MANUALMENTE